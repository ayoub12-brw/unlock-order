<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب إزالة iCloud</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>طلب إزالة iCloud</h2>
        <form id="unlockForm">
            <label for="service">نوع الخدمة:</label>
            <select id="service" required>
                <option value="iPhone 17 Pro Max iCloud Unlock Clean/Lost">iPhone 17 Pro Max iCloud Unlock Clean/Lost</option>
                <option value="iPhone 15 iCloud Unlock">iPhone 15 iCloud Unlock</option>
                <option value="iPad iCloud Unlock">iPad iCloud Unlock</option>
            </select>
            <label for="imei">IMEI:</label>
            <input type="text" id="imei" required maxlength="16" pattern="[A-Za-z0-9]+">
            <label for="email">الإيميل:</label>
            <input type="email" id="email" required>
            <button type="submit">إرسال الطلب</button>
        </form>
        <div id="successMsg" style="display:none;">
            <p>تم إرسال الطلب بنجاح! يمكنك تحميل الإيصال PDF.</p>
            <button id="downloadPDF">تحميل الإيصال PDF</button>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
